<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Cesium Terrain ¢ Muttenz</title>

  <!-- CesiumJS 1.120 laden -->
  <script>
    window.CESIUM_BASE_URL = "https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/";
  </script>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>
  <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css">

  <style>
    html, body, #cesiumContainer { width:100%; height:100%; margin:0; padding:0; background:#000; overflow:hidden; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <script>
    (async () => {
      const terrainProvider = await Cesium.CesiumTerrainProvider.fromUrl(
        "http://localhost:8083/terrain_qm",   // ggf. Port anpassen
        { requestVertexNormals: true, requestWaterMask: false }
      );

      const viewer = new Cesium.Viewer("cesiumContainer", {
        terrainProvider,
        imageryProvider: new Cesium.OpenStreetMapImageryProvider({ url: "https://a.tile.openstreetmap.org/" }),
        baseLayerPicker: false, geocoder: false, timeline: false, animation: false, shadows: false
      });

      // Kamera nach Muttenz
      const lon = 7.642048508425487;
      const lat = 47.53461153297667;
      const height = 1200; // Meter ³ber Grund ¢ bei Bedarf feiner einstellen

      viewer.scene.globe.depthTestAgainstTerrain = true;
      viewer.scene.globe.enableLighting = true;

      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(lon, lat, height),
        orientation: {
          heading: Cesium.Math.toRadians(0),   // 0 = Norden
          pitch: Cesium.Math.toRadians(-35),   // leicht nach unten schauen
          roll: 0
        },
        duration: 1.5
      });

      // Optional: logge Terrain layer.json Status
      try {
        const r = await fetch("http://localhost:8083/terrain_qm/layer.json");
        console.log("layer.json Status:", r.status);
      } catch(e) { console.warn("layer.json nicht abrufbar (optional):", e); }
    })();
  </script>
</body>
</html>

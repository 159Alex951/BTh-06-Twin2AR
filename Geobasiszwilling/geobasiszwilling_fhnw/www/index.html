<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="utf-8" />
  <title>FHNW: Geobasiszwilling Muttenz</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="./favicon.ico">

  <!-- CesiumJS -->
  <script>
    window.CESIUM_BASE_URL =
      "https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/";
  </script>
  <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css">

  <!-- Eigene Styles -->
  <link rel="stylesheet" href="./styles.css">
  
  <!-- Tools -->
  <script src="./tools/bbox-tool.js"></script>
  <!-- layers.js is loaded at the bottom via /tools/layers.js to avoid duplicate execution -->

</head>

<body>
  <div id="cesiumContainer"></div>
  <!-- Legende für Baujahr-Farben -->
  <div id="bfsLegend" style="display:none; position:fixed; bottom:40px; right:120px; z-index:20; background:rgba(0,0,0,0.65); color:#f5f5f5; border-radius:10px; box-shadow:0 4px 16px rgba(0,0,0,0.4); padding:14px 18px; font-size:14px; min-width:130px; backdrop-filter: blur(4px);">
    <b>Gebäude Baujahr</b><br>
    <div style="margin:6px 0 2px 0; display:flex; align-items:center;"><span style="display:inline-block;width:22px;height:12px;background:#ff0000;margin-right:8px;"></span> < 1900</div>
    <div style="margin:2px 0; display:flex; align-items:center;"><span style="display:inline-block;width:22px;height:12px;background:#ff6600;margin-right:8px;"></span> 1900–1949</div>
    <div style="margin:2px 0; display:flex; align-items:center;"><span style="display:inline-block;width:22px;height:12px;background:#ffff00;margin-right:8px; border:1px solid #ccc;"></span> 1950–1979</div>
    <div style="margin:2px 0; display:flex; align-items:center;"><span style="display:inline-block;width:22px;height:12px;background:#00ff00;margin-right:8px;"></span> 1980–1999</div>
    <div style="margin:2px 0; display:flex; align-items:center;"><span style="display:inline-block;width:22px;height:12px;background:#008000;margin-right:8px;"></span> 2000–2009</div>
    <div style="margin:2px 0; display:flex; align-items:center;"><span style="display:inline-block;width:22px;height:12px;background:#00b300;margin-right:8px;"></span> ≥ 2010</div>
    <div style="margin:2px 0; display:flex; align-items:center;"><span style="display:inline-block;width:22px;height:12px;background:#d3d3d3;margin-right:8px; border:1px solid #ccc;"></span> kein Baujahr</div>
  </div>
  <!-- FHNW Logo -->
  <div class="fhnw-logo">
    <img src="./img/FHNW_Logo.png" alt="FHNW Logo">
  </div>
  <!-- Layer-Auswahl Panel -->
  <div class="layer-panel">
    <button type="button" id="homeBtn" class="home-btn" style="opacity: 0.5;">Home</button>
    <!-- Fullscreen-Button entfernt, kommt zu den Floating-Buttons -->
    <button type="button" id="timelineToggleBtn" class="home-btn">Zeitachse</button>
    <!-- Licht-Button entfernt, kommt zu den Floating-Buttons -->
    
    <div class="tileset-dropdown">
      <button type="button" id="tilesetBtn">Layer</button>

      <div id="tilesetList" class="tileset-list">
        <label><input type="checkbox" id="chkBuildingsBFS" class="tilesetCheck"> Buildings</label>
        <label><input type="checkbox" id="chkRoofs" class="tilesetCheck" checked> Roofs</label>
        <label><input type="checkbox" id="chkBuildingsSwisstopo" class="tilesetCheck"> Buildings (Swisstopo API)</label>
        <label><input type="checkbox" id="chkProjectedBuildings"> Geplante Gebäude test</label> <!-- new -->
        <label><input type="checkbox" id="chkPointcloud" class="tilesetCheck"> Pointcloud</label>
        <label><input type="checkbox" id="chkFixpunkte" class="tilesetCheck">FHNW Fixpunkte 2020</label>
        <label><input type="checkbox" id="chkOrthoFHNW" class="tilesetCheck">FHNW Orthofoto 2020 (5cm)</label>
        <label><input type="checkbox" id="chkMeshGLB" class="tilesetCheck">FHNW Mesh 2020 (GLB)</label>
      </div>
    </div>

    <div class="baselayer-dropdown">
      <button type="button" id="baselayerBtn">Basiskarten</button>

      <div id="baselayerList" class="baselayer-list">
        <label><input type="radio" name="baselayer" value="muttenz" checked> Ortho Muttenz</label>
        <label><input type="radio" name="baselayer" value="terrain-gray"> Terrain Grau</label>
        <label><input type="radio" name="baselayer" value="pixelkarte-farbe"> Landeskarte</label>
      </div>
    </div>
    
    <button type="button" id="drawBBoxBtn" class="home-btn" style="opacity: 0.5;">Export Box</button>
  </div>

  <!-- Klassifikations-Panel (nur sichtbar wenn Pointcloud aktiv) -->
  <div class="classification-panel" id="classificationPanel" style="display: none;">
    <button type="button" id="closeClassificationPanel" class="close-panel-btn" title="Schliessen">x</button>
    <div class="pc-class-list-inline">
      <label><input type="checkbox" class="pcClass" value="2"> Boden</label>
      <label><input type="checkbox" class="pcClass" value="3" checked> Veg. Low</label>
      <label><input type="checkbox" class="pcClass" value="4"> Veg. Med</label>
      <label><input type="checkbox" class="pcClass" value="5"> Veg. High</label>
      <label><input type="checkbox" class="pcClass" value="6" checked> Building</label>
      <label><input type="checkbox" class="pcClass" value="7"> Noise</label>
      <label><input type="checkbox" class="pcClass" value="9"> Wasser</label>
    </div>
    <button type="button" id="resolutionToggle" class="resolution-toggle-btn">High-Res</button>
  </div>

  <!-- Export Box Panel -->
  <div class="export-panel" id="exportPanel" style="display: none;">
    <button type="button" id="closeExportPanel" class="close-panel-btn" title="Schliessen">x</button>
    <h3>Export Box</h3>
    <div class="export-height-control">
      <label for="boxHeightSlider">Box Höhe: <span id="topHeightValue">100</span>m</label>
      <input type="range" id="boxHeightSlider" min="10" max="500" value="100" step="10" class="height-slider">
    </div>
    <div class="export-controls">
      <button type="button" id="resetBoxBtn" class="export-control-btn">Reset Box</button>
      <button type="button" id="redrawBoxBtn" class="export-control-btn">Neu zeichnen</button>
      <button type="button" id="exportDataBtn" class="export-control-btn">Exportieren</button>
    </div>
  </div>

  <!-- Koordinatenanzeige -->
  <div class="coord-panel" id="coordPanel">
    E: - | N: - | H: -
  </div>

  <!-- Floating Action Buttons (rechts unten) -->
  <div class="floating-buttons" id="floatingButtons">
    <div style="position:relative; display:inline-block;">
      <button type="button" id="lightingToggleBtn" class="floating-btn" title="Licht & Schatten">🌤️</button>
      <div id="lightingLabel" style="position:absolute; right:60px; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.65); color:#f5f5f5; padding:6px 14px; border-radius:8px; font-size:13px; font-family:'Bahnschrift',Arial,sans-serif; white-space:nowrap; box-shadow:0 2px 8px rgba(0,0,0,0.25);">
        <span style="position:absolute; left:100%; top:50%; transform:translateY(-50%); width:0; height:0; border-top:8px solid transparent; border-bottom:8px solid transparent; border-left:12px solid rgba(0,0,0,0.65);"></span>
        Licht & Schatten umschalten
      </div>
    </div>
    <button type="button" id="classificationToggle" class="floating-btn" style="display: none;" title="Punktwolken-Filter">☁️</button>
    <button type="button" id="exportToggle" class="floating-btn" style="display: none;" title="Export Box">📦</button>
    <button type="button" id="timelineControlsToggle" class="floating-btn" style="display: none;" title="Zeitsteuerung">🕒</button>
    <div style="position:relative; display:inline-block;">
      <button type="button" id="bfsLegendToggle" class="floating-btn" title="Gebäude nach Baujahr anzeigen">🏢</button>
      <div id="bfsLegendLabel" style="position:absolute; right:60px; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.65); color:#f5f5f5; padding:6px 14px; border-radius:8px; font-size:13px; font-family:'Bahnschrift',Arial,sans-serif; white-space:nowrap; box-shadow:0 2px 8px rgba(0,0,0,0.25);">
        <span style="position:absolute; left:100%; top:50%; transform:translateY(-50%); width:0; height:0; border-top:8px solid transparent; border-bottom:8px solid transparent; border-left:12px solid rgba(0,0,0,0.65);"></span>
        Gebäude nach Baujahr färben
      </div>
    </div>
    <button type="button" id="fullscreenBtn" class="floating-btn floating-btn-inactive" title="Vollbild">⛶</button>
  </div>

  <!-- Timeline Controls Panel -->
  <div class="timeline-controls" id="timelineControls" style="display: none;">
    <button type="button" id="closeTimelineControls" class="close-panel-btn" title="Schliessen">x</button>
    <div class="timeline-controls-row">
      <label>Aktuell:</label>
      <div style="position:relative; display:inline-block;">
        <button id="currentDateTime" class="current-datetime timeline-btn-tooltip" type="button">19.11.2025 12:00</button>
        <div id="currentDateTimeTooltip" style="display:none; position:absolute; left:50%; top:-38px; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:#fff; font-size:12px; font-family:'Bahnschrift',Arial,sans-serif; padding:5px 14px; border-radius:6px; white-space:nowrap; box-shadow:0 2px 8px rgba(0,0,0,0.18); pointer-events:none;">Zeige aktuelle Zeit</div>
      </div>
    </div>
    <div class="timeline-controls-row timeline-controls-row-flex">
      <div class="timeline-col timeline-col-date">
        <label>Datum:</label>
        <div class="custom-date-picker">
          <input type="text" id="customDateInput" class="timeline-input timeline-input-small" placeholder="TT.MM.JJJJ">
          <div class="calendar-popup" style="display: none;">
            <div class="calendar-header">
              <button type="button" id="prevMonth" class="cal-nav-btn">&lt;</button>
              <span id="monthYearDisplay"></span>
              <button type="button" id="nextMonth" class="cal-nav-btn">&gt;</button>
            </div>
            <div class="calendar-grid"></div>
          </div>
        </div>
        <div class="custom-time-picker">
          <input type="text" id="customTimeInput" class="timeline-input timeline-input-small" placeholder="HH:MM" value="12:00">
          <div class="time-popup" style="display: none;">
            <div class="time-selector">
              <div class="time-column">
                <button type="button" id="hourUp" class="time-nav-btn">&#9650;</button>
                <span id="hourDisplay" class="time-number">12</span>
                <button type="button" id="hourDown" class="time-nav-btn">&#9660;</button>
              </div>
              <span class="time-separator">:</span>
              <div class="time-column">
                <button type="button" id="minuteUp" class="time-nav-btn">&#9650;</button>
                <span id="minuteDisplay" class="time-number">00</span>
                <button type="button" id="minuteDown" class="time-nav-btn">&#9660;</button>
              </div>
            </div>
            <button type="button" id="setTimeBtn" class="timeline-btn timeline-btn-wide">Zeit setzen</button>
          </div>
        </div>
        <button type="button" id="jumpToDateTime" class="timeline-btn timeline-btn-wide" style="font-size:13px;">Zeit setzen</button>
      </div>
      <div class="timeline-col timeline-col-view">
        <label>Ansicht:</label>
        <button type="button" class="timeline-scale-btn" data-scale="day">Tag</button>
        <button type="button" class="timeline-scale-btn" data-scale="century">100 Jahre</button>
      </div>
    </div>
  </div>

  <!-- Info Box -->
  <div id="infoBox" class="info-box">
    <div class="info-header">
      <span id="infoTitle">Gebaeudeinfo</span>
      <button id="infoClose">x</button>
    </div>
    <div id="infoContent"></div>
  </div>


  <!-- Scripts: zuerst Helper, dann App -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>
  <script src="/site/globals.js"></script>
  <script src="/tools/layers.js"></script>
  <script src="/site/tools/coords.js"></script>
  <script src="/site/tools/tiles.js"></script>
  <script src="/site/tools/infofenster.js"></script>
  <script src="/site/tools/timeline.js"></script>
  <script src="/site/app.js"></script>
</body>

</html>
